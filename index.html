<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Türkçe Braille</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f6fb;
      --card: rgba(255, 255, 255, 0.88);
      --border: rgba(255, 255, 255, 0.7);
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #4f46e5;
      --primary-soft: #eef2ff;
      --dot: #d6dbe7;
      --dot-active: #111827;
      --shadow: 0 14px 40px rgba(31, 41, 55, 0.10);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #e9edff 0%, transparent 30%),
        radial-gradient(circle at top right, #f4e8ff 0%, transparent 28%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin: 0;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255,255,255,0.9);
      color: var(--muted);
      font-size: 13px;
      backdrop-filter: blur(10px);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
    }

    .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1.5px solid #d9dff0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 18px;
      line-height: 1.5;
      outline: none;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      transition: 0.2s ease;
    }

    textarea:focus {
      border-color: #a5b4fc;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.10);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid #dbe1ef;
    }

    .btn-secondary:hover {
      background: #f8faff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }

    .output-box {
      min-height: 76px;
      background: rgba(248, 250, 255, 0.95);
      border: 1px solid #e4e8f2;
      border-radius: 18px;
      padding: 14px;
    }

    .symbol-output {
      font-size: 34px;
      line-height: 1.8;
      letter-spacing: 4px;
      word-break: break-word;
    }

    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .char-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid #edf0f7;
      min-width: 72px;
    }

    .char-label {
      font-size: 18px;
      font-weight: 800;
      min-height: 24px;
    }

    .braille-cell,
    .bracelet-cell {
      display: grid;
      grid-template-columns: repeat(2, 22px);
      grid-template-rows: repeat(3, 22px);
      gap: 6px;
      padding: 10px;
      border-radius: 16px;
      background: #f5f7fc;
      border: 1px solid #e7ebf3;
    }

    .dot,
    .bead {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--dot);
      border: 1px solid #bcc6d6;
      transition: 0.2s ease;
    }

    .dot.active,
    .bead.active {
      background: var(--dot-active);
      border-color: var(--dot-active);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .footer-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .full {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 16px 12px 30px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .title {
        font-size: 24px;
      }

      .symbol-output {
        font-size: 28px;
        letter-spacing: 2px;
      }

      .braille-cell,
      .bracelet-cell {
        grid-template-columns: repeat(2, 18px);
        grid-template-rows: repeat(3, 18px);
        gap: 5px;
        padding: 8px;
      }

      .dot,
      .bead {
        width: 18px;
        height: 18px;
      }

      .char-card {
        min-width: 62px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1 class="title">Türkçe Braille</h1>
      <div class="badge">6 nokta • sembol • bileklik</div>
    </div>

    <div class="panel full">
      <label class="label" for="textInput">Metin</label>
      <textarea id="textInput" placeholder="Bir metin yaz..."></textarea>

      <div class="actions">
        <button class="btn-primary" onclick="convertAll()">Çevir</button>
        <button class="btn-secondary" onclick="fillExample()">Örnek</button>
        <button class="btn-secondary" onclick="clearAllFields()">Temizle</button>
        <button class="btn-secondary" onclick="speakText()">Sesli oku</button>
      </div>
    </div>

    <div class="grid">
      <div class="panel full">
        <h2 class="section-title">Braille sembol</h2>
        <div id="brailleSymbolResult" class="output-box symbol-output"></div>
      </div>

      <div class="panel">
        <h2 class="section-title">6 noktalı Braille</h2>
        <div id="sixDotOutput" class="output-box cards-grid"></div>
        <div class="footer-note">Düzen: 1-4 / 2-5 / 3-6</div>
      </div>

      <div class="panel">
        <h2 class="section-title">Bileklik önizleme</h2>
        <div id="braceletPreview" class="output-box cards-grid"></div>
        <div class="footer-note">Aynı nokta dizilimi kullanılır.</div>
      </div>
    </div>
  </div>

  <script>
    const brailleMap = {
      "a": [1],
      "b": [1, 2],
      "c": [1, 4],
      "ç": [1, 6],
      "d": [1, 4, 5],
      "e": [1, 5],
      "f": [1, 2, 4],
      "g": [1, 2, 4, 5],
      "ğ": [1, 2, 6],
      "h": [1, 2, 5],
      "ı": [2, 4],
      "i": [2, 4],
      "j": [2, 4, 5],
      "k": [1, 3],
      "l": [1, 2, 3],
      "m": [1, 3, 4],
      "n": [1, 3, 4, 5],
      "o": [1, 3, 5],
      "ö": [2, 4, 6],
      "p": [1, 2, 3, 4],
      "r": [1, 2, 3, 5],
      "s": [2, 3, 4],
      "ş": [1, 4, 6],
      "t": [2, 3, 4, 5],
      "u": [1, 3, 6],
      "ü": [1, 2, 5, 6],
      "v": [1, 2, 3, 6],
      "y": [1, 3, 4, 5, 6],
      "z": [1, 3, 5, 6],
      " ": []
    };

    function normalizeChar(char) {
      return char.toLocaleLowerCase("tr-TR");
    }

    function getBrailleDots(char) {
      const normalized = normalizeChar(char);
      return brailleMap[normalized] || [];
    }

    function dotsToBrailleUnicode(dots) {
      let value = 0;
      if (dots.includes(1)) value += 1;
      if (dots.includes(2)) value += 2;
      if (dots.includes(3)) value += 4;
      if (dots.includes(4)) value += 8;
      if (dots.includes(5)) value += 16;
      if (dots.includes(6)) value += 32;
      return String.fromCharCode(0x2800 + value);
    }

    function createCell(dots, cellClass, pointClass) {
      const cell = document.createElement("div");
      cell.className = cellClass;

      for (let i = 1; i <= 6; i++) {
        const point = document.createElement("div");
        point.className = pointClass;

        if (dots.includes(i)) {
          point.classList.add("active");
        }

        cell.appendChild(point);
      }

      return cell;
    }

    function createCharCard(char, type) {
      const card = document.createElement("div");
      card.className = "char-card";

      const label = document.createElement("div");
      label.className = "char-label";
      label.textContent = char === " " ? "␣" : char;

      const dots = getBrailleDots(char);
      const cell = type === "braille"
        ? createCell(dots, "braille-cell", "dot")
        : createCell(dots, "bracelet-cell", "bead");

      card.appendChild(label);
      card.appendChild(cell);

      return card;
    }

    function renderBrailleSymbolResult(text) {
      const result = document.getElementById("brailleSymbolResult");
      let output = "";

      for (const char of text) {
        const dots = getBrailleDots(char);
        output += dotsToBrailleUnicode(dots);
      }

      result.textContent = output;
    }

    function renderSixDotOutput(text) {
      const container = document.getElementById("sixDotOutput");
      container.innerHTML = "";

      for (const char of text) {
        container.appendChild(createCharCard(char, "braille"));
      }
    }

    function renderBraceletPreview(text) {
      const container = document.getElementById("braceletPreview");
      container.innerHTML = "";

      for (const char of text) {
        container.appendChild(createCharCard(char, "bracelet"));
      }
    }

    function convertAll() {
      const text = document.getElementById("textInput").value || "";
      renderBrailleSymbolResult(text);
      renderSixDotOutput(text);
      renderBraceletPreview(text);
    }

    function fillExample() {
      document.getElementById("textInput").value = "çk şüğö";
      convertAll();
    }

    function clearAllFields() {
      document.getElementById("textInput").value = "";
      document.getElementById("brailleSymbolResult").textContent = "";
      document.getElementById("sixDotOutput").innerHTML = "";
      document.getElementById("braceletPreview").innerHTML = "";
    }

    function speakText() {
      const text = document.getElementById("textInput").value.trim();

      if (!text) {
        alert("Önce bir metin gir.");
        return;
      }

      if (!("speechSynthesis" in window)) {
        alert("Bu cihazda sesli okuma desteklenmiyor.");
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "tr-TR";
      utterance.rate = 0.95;
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    document.getElementById("textInput").addEventListener("input", convertAll);

    convertAll();
  </script>
</body>
</html>
